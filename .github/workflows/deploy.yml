name: Deploy para GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Build do frontend
        run: pnpm --filter @sistema/web build
        env:
          # base path = nome do repositório (https://<user>.github.io/Sistema/)
          VITE_BASE_PATH: /Sistema/
          # A anon/publishable key é pública (protegida por RLS) — ok embutir.
          # Para sobrescrever, defina os secrets de mesmo nome no repositório.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://xglbppuiwdfuxdmyvbix.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_WaJxB6z86cGeZmpNx8Lr_Q_OyMWL2_r' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
